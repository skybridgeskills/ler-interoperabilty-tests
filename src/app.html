<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Apply persisted theme before paint to prevent flash.
			(function () {
				try {
					var theme = localStorage.getItem('theme') || 'system';
					var html = document.documentElement;
					var prefersDark =
						window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
					var resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
					if (resolved === 'dark') html.classList.add('dark');
					else html.classList.remove('dark');
				} catch (_) {
					/* localStorage may be unavailable; default to light */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
